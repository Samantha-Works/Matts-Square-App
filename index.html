<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Matt's Square App</title>
  <meta name="theme-color" content="#0b0f1a" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root{
      --bg:#0b0f1a;
      --panel:#0f172a;
      --panel2:#1a1206;
      --gold1:#fff3b0;
      --gold2:#f7d98a;
      --gold3:#d4af37;
      --gold4:#8a6a17;
      --cell:#e8ecf2;
      --cell-border:#20283a;
      --dark:#1f2937;
      --red:#cf6a4d;
      --text:#ffffff;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background: radial-gradient(circle at top, #1a0f05 0%, #0b0f1a 68%);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      padding:10px;
    }

    .app{
      max-width: 520px;
      margin: 0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height: calc(100vh - 20px);
    }

    .header{
      position:relative;
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:20px;
      padding:14px 18px 14px 86px;
      background:
        radial-gradient(circle at center, rgba(255,200,80,0.14), transparent 70%),
        linear-gradient(145deg,var(--panel2),var(--panel));
      box-shadow:
        0 0 34px rgba(255,200,80,0.16),
        inset 0 0 24px rgba(255,200,80,0.08);
      overflow:hidden;
    }

    .logo{
      position:absolute;
      left:12px;
      width:58px;
      height:58px;
      object-fit:cover;
      border-radius:50%;
      background:#000;
      animation: glowPulse 2.8s infinite ease-in-out;
      box-shadow: 0 0 12px gold, 0 0 28px rgba(255,215,0,0.58);
    }

    @keyframes glowPulse{
      0%{ box-shadow:0 0 10px gold,0 0 22px rgba(255,215,0,0.45); }
      50%{ box-shadow:0 0 18px gold,0 0 38px rgba(255,215,0,0.86); }
      100%{ box-shadow:0 0 10px gold,0 0 22px rgba(255,215,0,0.45); }
    }

    .title{
      text-align:center;
      font-weight:900;
      font-size: clamp(18px, 5vw, 30px);
      line-height:1.05;
      letter-spacing:.4px;
      background: linear-gradient(to bottom, #fff8d0 0%, #ffd700 42%, #b8860b 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 10px rgba(255,215,0,0.35);
      user-select:none;
    }

    .board-wrap{
      background: linear-gradient(145deg, #1a1206, #0f172a);
      border-radius:18px;
      padding:8px;
      box-shadow: inset 0 0 20px rgba(255,200,80,0.08);
    }

    .board{
      width:100%;
      max-width:100%;
      aspect-ratio:1;
      display:grid;
      grid-template-columns:repeat(11, 1fr);
      gap:2px;
      touch-action:none;
      user-select:none;
    }

    .num,
    .cell{
      border-radius:4px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:0;
      text-align:center;
      overflow:hidden;
      line-height:1;
      padding:2px;
    }

    .num{
      background: linear-gradient(var(--gold2), var(--gold3));
      color:#111;
      font-weight:900;
      font-size: clamp(10px, 2.3vw, 14px);
    }

    .corner{
      background: linear-gradient(var(--gold2), var(--gold3));
    }

    .cell{
      background: var(--cell);
      color:#121212;
      font-size: clamp(8px, 1.8vw, 12px);
      font-weight:700;
      cursor:pointer;
      border:1px solid rgba(20,24,35,.16);
      transition: transform .08s ease, box-shadow .12s ease;
    }

    .cell:hover{ transform:scale(1.02); }

    .cell.filled{
      color:#fff;
      text-shadow:0 1px 1px rgba(0,0,0,.3);
    }

    .controls{
      background: var(--panel);
      border-radius:18px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .stats{
      display:grid;
      gap:8px;
    }

    .stat{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size: clamp(14px, 3.8vw, 16px);
    }

    .stat b{ white-space:nowrap; }

    .name-input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      outline:none;
      background:var(--dark);
      color:#fff;
      font-size:18px;
    }

    .buttons{
      display:grid;
      gap:10px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:15px 14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }

    .gold{ background:linear-gradient(var(--gold2), var(--gold3)); color:#000; }
    .dark{ background:var(--dark); color:#fff; }
    .red{ background:var(--red); color:#fff; }

    .saved{
      background: var(--panel);
      border-radius:18px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height: 220px;
      overflow:auto;
    }

    .saved-title{
      font-size:18px;
      font-weight:900;
    }

    .saved-item{
      background: var(--dark);
      border-radius:12px;
      padding:8px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .saved-left{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .saved-name{
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .saved-meta{
      opacity:.8;
      font-size:12px;
    }

    .saved-load{
      padding:8px 10px;
      border-radius:10px;
      font-size:13px;
    }

    .hint{
      opacity:.7;
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <img src="logo.png" class="logo" alt="Matt's Square App logo" />
      <div class="title">Matt's Square App</div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="controls">
      <div class="stats">
        <div class="stat"><span>Squares</span><b id="count">0/100</b></div>
        <div class="stat"><span>Status</span><b id="status">Open</b></div>
        <div class="stat"><span>Painter</span><b id="player">None</b></div>
      </div>

      <input id="name" class="name-input" placeholder="Enter Name" autocomplete="off" />

      <div class="buttons">
        <button class="gold" id="downloadBtn">Download</button>
        <button class="dark" id="saveBtn">Save</button>
        <button class="dark" id="unlockBtn">Unlock</button>
        <button class="red" id="clearBtn">Clear</button>
      </div>

      <div class="saved" id="savedBoards">
        <div class="saved-title">Saved Boards</div>
      </div>
      <div class="hint">Fill all 100 squares to auto-populate 0–9 across the top and left.</div>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const nameInput = document.getElementById('name');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const playerEl = document.getElementById('player');
    const savedBoardsEl = document.getElementById('savedBoards');

    const STORAGE_KEY = 'matts_square_app_boards_v1';

    let cells = Array(100).fill('');
    let colors = Array(100).fill('');
    let locked = false;
    let dragging = false;
    let topNums = Array(10).fill('');
    let sideNums = Array(10).fill('');
    let playerPalette = {};

    const palette = [
      '#6d8f41', '#2e4d80', '#8f392f', '#8f6b1f', '#4f3e77',
      '#2f6d62', '#7c5843', '#4b6b2a', '#8a4d6c', '#5e5e1f'
    ];

    function slug(text){
      return String(text || '').trim().toLowerCase();
    }

    function randNums(){
      return [...Array(10).keys()].sort(() => Math.random() - 0.5);
    }

    function getPlayerColor(name){
      const key = slug(name);
      if(!key) return '';
      if(!playerPalette[key]){
        const used = Object.keys(playerPalette).length;
        playerPalette[key] = palette[used % palette.length];
      }
      return playerPalette[key];
    }

    function build(){
      board.innerHTML = '';

      for(let r = 0; r < 11; r++){
        for(let c = 0; c < 11; c++){
          const d = document.createElement('div');

          if(r === 0 && c === 0){
            d.className = 'num corner';
            d.textContent = '';
          } else if(r === 0){
            d.className = 'num';
            d.textContent = topNums[c - 1] !== '' ? topNums[c - 1] : '';
          } else if(c === 0){
            d.className = 'num';
            d.textContent = sideNums[r - 1] !== '' ? sideNums[r - 1] : '';
          } else {
            const idx = (r - 1) * 10 + (c - 1);
            d.className = 'cell';
            d.textContent = cells[idx];
            if(cells[idx]){
              d.classList.add('filled');
              d.style.background = colors[idx] || getPlayerColor(cells[idx]);
            }

            d.addEventListener('mousedown', (e) => {
              e.preventDefault();
              startPaint(idx);
            });
            d.addEventListener('mouseenter', () => dragPaint(idx));
            d.addEventListener('touchstart', (e) => {
              e.preventDefault();
              startPaint(idx);
            }, { passive:false });
          }

          board.appendChild(d);
        }
      }
    }

    function updateStats(){
      const count = cells.filter(Boolean).length;
      countEl.textContent = `${count}/100`;
      playerEl.textContent = nameInput.value.trim() || 'None';
      statusEl.textContent = locked ? 'Locked' : 'Open';
    }

    function redraw(){
      updateStats();
      build();
    }

    function paint(idx){
      if(locked) return;
      const name = nameInput.value.trim();
      if(!name) return;
      if(cells[idx] && cells[idx] !== name) return;
      cells[idx] = name;
      colors[idx] = getPlayerColor(name);
      redraw();
    }

    function startPaint(idx){
      if(locked) return;
      dragging = true;
      paint(idx);
    }

    function dragPaint(idx){
      if(!dragging) return;
      paint(idx);
    }

    function stopPaint(){
      if(!dragging) return;
      dragging = false;
      checkFull();
    }

    function checkFull(){
      if(cells.every(Boolean)){
        topNums = randNums();
        sideNums = randNums();
        locked = true;
        redraw();
      }
    }

    function clearBoard(){
      if(locked) return;
      cells = Array(100).fill('');
      colors = Array(100).fill('');
      topNums = Array(10).fill('');
      sideNums = Array(10).fill('');
      redraw();
    }

    function unlockBoard(){
      locked = false;
      redraw();
    }

    function serializeBoard(){
      return {
        id: Date.now(),
        savedAt: new Date().toLocaleString(),
        cells: [...cells],
        colors: [...colors],
        topNums: [...topNums],
        sideNums: [...sideNums],
        locked,
        playerPalette: { ...playerPalette }
      };
    }

    function saveBoard(){
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      saved.unshift(serializeBoard());
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved.slice(0, 20)));
      renderSaved();
    }

    function loadBoard(id){
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const found = saved.find(item => item.id === id);
      if(!found) return;
      cells = [...found.cells];
      colors = [...(found.colors || Array(100).fill(''))];
      topNums = [...(found.topNums || Array(10).fill(''))];
      sideNums = [...(found.sideNums || Array(10).fill(''))];
      locked = !!found.locked;
      playerPalette = { ...(found.playerPalette || {}) };
      redraw();
    }

    function renderSaved(){
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      savedBoardsEl.innerHTML = '<div class="saved-title">Saved Boards</div>';

      if(saved.length === 0){
        const empty = document.createElement('div');
        empty.className = 'saved-meta';
        empty.textContent = 'No saved boards yet.';
        savedBoardsEl.appendChild(empty);
        return;
      }

      saved.forEach(item => {
        const row = document.createElement('div');
        row.className = 'saved-item';
        row.innerHTML = `
          <div class="saved-left">
            <div class="saved-name">Board ${new Date(item.id).toLocaleDateString()}</div>
            <div class="saved-meta">${item.savedAt}</div>
          </div>
        `;
        const btn = document.createElement('button');
        btn.className = 'gold saved-load';
        btn.textContent = 'Load';
        btn.addEventListener('click', () => loadBoard(item.id));
        row.appendChild(btn);
        savedBoardsEl.appendChild(row);
      });
    }

    function downloadBoard(){
      html2canvas(document.querySelector('.app')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Matt_Square_Board.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    document.addEventListener('mouseup', stopPaint);
    document.addEventListener('touchend', stopPaint);
    document.addEventListener('touchcancel', stopPaint);

    document.addEventListener('touchmove', (e) => {
      if(!dragging) return;
      const touch = e.touches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if(target && target.classList.contains('cell')){
        const nodes = [...board.querySelectorAll('.cell')];
        const idx = nodes.indexOf(target);
        if(idx >= 0) paint(idx);
      }
    }, { passive:true });

    document.getElementById('clearBtn').addEventListener('click', clearBoard);
    document.getElementById('unlockBtn').addEventListener('click', unlockBoard);
    document.getElementById('saveBtn').addEventListener('click', saveBoard);
    document.getElementById('downloadBtn').addEventListener('click', downloadBoard);
    nameInput.addEventListener('input', updateStats);

    redraw();
    renderSaved();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
